name: Backend Schema Check CI

on:
  pull_request:
    paths:
      - backend/**
      - .github/workflows/backend-schema-check.yml
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/backend-schema-check.yml

concurrency:
  group: backend-schema-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-check:
    name: Backend schema contract check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run schema checks
        run: npm run check:schemas
